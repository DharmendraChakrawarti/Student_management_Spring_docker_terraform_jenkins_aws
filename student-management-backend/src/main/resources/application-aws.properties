# =============================================================
#  AWS RDS CONFIGURATION PROFILE
# =============================================================
#
#  HOW TO USE THIS FILE:
#  ---------------------
#  This profile is activated when you set the environment variable:
#      SPRING_PROFILES_ACTIVE=aws
#
#  In docker-compose (for AWS deployment), add this to the backend service:
#      environment:
#        SPRING_PROFILES_ACTIVE: aws
#        SPRING_DATASOURCE_URL: jdbc:mysql://<YOUR-RDS-ENDPOINT>:3306/student_db
#        SPRING_DATASOURCE_USERNAME: <YOUR-RDS-USERNAME>
#        SPRING_DATASOURCE_PASSWORD: <YOUR-RDS-PASSWORD>
#
#  Or in ECS Task Definition / Jenkins pipeline, pass them as env vars.
#
#  IMPORTANT NOTES:
#  ----------------
#  1. Replace <YOUR-RDS-ENDPOINT> with the actual RDS endpoint
#     Example: my-db-instance.c9xxxxx.us-east-1.rds.amazonaws.com
#
#  2. The RDS instance must have:
#     - The security group allowing inbound MySQL (port 3306) from
#       the ECS/EC2 security group
#     - The database 'student_db' already created, OR use
#       createDatabaseIfNotExist=true in the URL
#
#  3. NEVER commit real credentials to Git!
#     Use environment variables or AWS Secrets Manager instead.
#
# =============================================================

# --- RDS Database Connection ---
# The URL below is a TEMPLATE. Override it with env vars in production.
spring.datasource.url=jdbc:mysql://${RDS_HOSTNAME:localhost}:${RDS_PORT:3306}/${RDS_DB_NAME:student_db}?useSSL=true&requireSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=${RDS_USERNAME:admin}
spring.datasource.password=${RDS_PASSWORD:changeme}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
# Use 'update' for development; for production consider 'validate' with Flyway/Liquibase
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Connection Pool (production-tuned) ---
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
# Enable connection leak detection in production
spring.datasource.hikari.leak-detection-threshold=60000

# --- SSL ---
# AWS RDS supports SSL. The MySQL Connector/J automatically trusts
# the Amazon RDS CA certificate when useSSL=true.

# --- Logging (reduced for production) ---
logging.level.org.springframework.security=WARN
logging.level.com.example.sms=INFO
logging.level.com.zaxxer.hikari=INFO
