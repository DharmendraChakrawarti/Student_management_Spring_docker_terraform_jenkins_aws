# =============================================================
#  STUDENT MANAGEMENT SYSTEM — SPRING BOOT CONFIGURATION
#  Active profile is set via SPRING_PROFILES_ACTIVE env variable
#  Default (no profile) = local Docker MySQL container
# =============================================================

# ===============================
# SERVER CONFIG
# ===============================
server.port=8080
server.address=0.0.0.0

# ===============================
# DATABASE CONFIG (LOCAL DOCKER - DEFAULT)
# ===============================
# Connects to the 'mysql' service defined in docker-compose.yml
# The hostname 'mysql' is the Docker Compose service name
spring.datasource.url=jdbc:mysql://mysql:3306/student_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=appuser
spring.datasource.password=app123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE CONFIG
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
# Use the auto-detected dialect (recommended for Spring Boot 3.x)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# CONNECTION POOL (HikariCP)
# ===============================
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ===============================
# JWT CONFIG
# ===============================
jwt.secret=MySuperSecureJwtKeyForStudentManagementSystem2026
jwt.expiration=604800000

# ===============================
# CORS CONFIG
# ===============================
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:80,http://localhost

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.security=INFO
logging.level.com.example.sms=DEBUG