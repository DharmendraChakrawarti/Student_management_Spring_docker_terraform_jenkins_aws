# ===== Default: H2 in-memory database (for local development) =====
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:student_db}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.h2.console.enabled=true

# JPA Settings
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false

# Server
server.port=${SERVER_PORT:8080}

# CORS allowed origins (comma-separated, overridable via env)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:80,http://localhost}

# Logging (reduce to WARN for production, DEBUG for dev)
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:WARN}
logging.level.com.example.sms=${LOG_LEVEL_APP:INFO}
