# ===============================
# SERVER CONFIG
# ===============================
server.port=8080
server.address=0.0.0.0

# ===============================
# DATABASE CONFIG
# ===============================
spring.datasource.url=jdbc:mysql://mysql-db:3306/student_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

# ===============================
# JPA CONFIG
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ===============================
# JWT CONFIG
# ===============================
jwt.secret=MySuperSecureJwtKeyForStudentManagementSystem2026
jwt.expiration=604800000

# ===============================
# CORS CONFIG
# ===============================
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:80