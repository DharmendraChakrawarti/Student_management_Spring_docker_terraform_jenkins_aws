# =============================================================
#  NGINX CONFIG — Frontend + API Reverse Proxy
# =============================================================
#  This serves the React build AND proxies /api/ calls to the
#  Spring Boot backend container.
# =============================================================

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # -----------------------------------------------------------
    # Frontend — React Single Page Application
    # -----------------------------------------------------------
    # All non-API, non-file requests fall back to index.html
    # so React Router can handle client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -----------------------------------------------------------
    # API Reverse Proxy → Spring Boot Backend
    # -----------------------------------------------------------
    # Any request to /api/* is forwarded to the backend container.
    # 'backend' resolves via Docker Compose networking.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts for slow backend responses
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # -----------------------------------------------------------
    # Health Check Endpoint
    # -----------------------------------------------------------
    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}