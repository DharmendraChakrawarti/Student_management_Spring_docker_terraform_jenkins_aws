version: '3.8'

services:

  # ===== MySQL Database =====
  mysql-db:
    image: mysql:8.0
    container_name: student-mysql
    environment:
      MYSQL_DATABASE: student_db
      MYSQL_ROOT_PASSWORD: password
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    restart: always
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - student-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppassword"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ===== Spring Boot Backend =====
  backend:
    build:
      context: ./student-management-backend
      dockerfile: Dockerfile
    container_name: student-backend
    ports:
      - "8080:8080"
    environment:
      # Database (MySQL in Docker)
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/student_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQL8Dialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      # CORS - allow frontend container
      CORS_ALLOWED_ORIGINS: http://localhost,http://localhost:80,http://localhost:3000,http://localhost:5173
      # Logging (production-friendly)
      LOG_LEVEL_SECURITY: WARN
      LOG_LEVEL_APP: INFO
    depends_on:
      mysql-db:
        condition: service_healthy
    restart: on-failure
    networks:
      - student-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/auth/login", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ===== React Frontend (Nginx) =====
  frontend:
    build:
      context: ./student-management-frontend
      dockerfile: Dockerfile
    container_name: student-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
    networks:
      - student-network

# ===== Named Volumes =====
volumes:
  mysql_data:
    driver: local

# ===== Network =====
networks:
  student-network:
    driver: bridge
